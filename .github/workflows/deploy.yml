name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build (production, gh-pages base-href)
        run: npx ng build --configuration production --base-href /kbssWeb/
        working-directory: frontend

      - name: Add 404.html for SPA client-side routing
        run: cp frontend/dist/kbss-portal/browser/index.html frontend/dist/kbss-portal/browser/404.html

      - name: Add .nojekyll (prevent Jekyll from ignoring _files)
        run: touch frontend/dist/kbss-portal/browser/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist/kbss-portal/browser
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy: ${{ github.event.head_commit.message }}'
